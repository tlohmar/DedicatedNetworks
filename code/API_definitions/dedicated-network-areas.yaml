    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: wip
  x-camara-commonalities: 0.6
servers:
  - url: "{apiRoot}/dedicated-network-areas/vwip"
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`
tags:
  - name: Areas
    description: Discover and read dedicated network service areas
paths:
  /retrieve-service-areas:
    post:
      tags:
        - Areas
      summary: Retrieve network service areas, filtered by additional search criteria
      description: Retrieve all network service areas matching the provided search criteria such as location, area overlap, name, or supported profiles.
      operationId: retrieveNetworkServiceAreas
      security:
        - openId:
            - dedicated-network-areas:areas:read
      requestBody:
        description: Parameters to query service areas
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrieveServiceAreasRequest"
        required: true
      responses:
        '200':
          description: List of available network service areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceArea'
        '400':
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"

  /areas/{areaId}:
    get:
      tags:
        - Areas
      summary: Read a network service area
      description: Read detailed information about a specific network service area identified by its areaId.
      operationId: readNetworkServiceArea
      security:
        - openId:
            - dedicated-network-areas:areas:read
      parameters:
        - name: areaId
          description: Identifier of the service area
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ServiceAreaId"
        - $ref: "../common/CAMARA_common.yaml#/components/parameters/x-correlator"
      responses:
        '200':
          description: Information about the network service area
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceArea'
        '400':
          $ref: "#/components/responses/Generic400"
        "401":
          $ref: "#/components/responses/Generic401"
        "403":
          $ref: "#/components/responses/Generic403"
        "404":
          $ref: "#/components/responses/Generic404"

components:
  securitySchemes:
    openId:
      description: OpenID Connect authentication
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration

  schemas:

    NetworkProfileId:
      description: Network profile id in UUID format
      type: string
      format: uuid

    QosProfileName:
      description: |
        A unique name for identifying a specific QoS profile.
        This may follow different formats depending on the service providers implementation.
        Some options addresses:
          - A UUID style string
          - Support for predefined profiles QOS_S, QOS_M, QOS_L, and QOS_E
          - A searchable descriptive name
        The set of QoS Profiles that an operator is offering can be retrieved by means of the QoS Profile API.
      type: string
      example: QCI_1_voice
      minLength: 3
      maxLength: 256
      format: string
      pattern: "^[a-zA-Z0-9_.-]+$"

    ServiceAreaId:
      description: Unique identifier of a network service area
      type: string
      format: uuid

    RetrieveServiceAreasRequest:
      description: Request object to retrieve service areas that match all the given properties
      type: object
      properties:
        atLocation:
          $ref: "../common/CAMARA_common.yaml#/components/schemas/Point"
        overlappingArea:
          $ref: "../common/CAMARA_common.yaml#/components/schemas/Area"
        coveringArea:
          $ref: "../common/CAMARA_common.yaml#/components/schemas/Area"
        byName:
          description: Only service areas with a name matching exactly this parameter are to be returned
          type: string
        byNetworkProfileId:
          $ref: "#/components/schemas/NetworkProfileId"
        byQosProfileName:
          $ref: "#/components/schemas/QosProfileName"

    ServiceArea:
      description: Common attributes of a service area, i.e. where the network service is supported
      properties:
        id:
          $ref: '#/components/schemas/ServiceAreaId'
        name:
          description: A readable name of the service area (need not be unique)
          type: string
        description:
          description: A readable description of the service area
          type: string
        area:
          $ref: "../common/CAMARA_common.yaml#/components/schemas/Area"
        networkProfiles:
          description: Dedicated network profiles which are supported in this area.
          type: array
          items:
            $ref: "#/components/schemas/NetworkProfileId"
          minItems: 1
        qosProfiles:
          description: Qos Profiles which are supported in this area.
          type: array
          items:
            $ref: '#/components/schemas/QosProfileName'
          minItems: 1
      required:
        - id
        - area
      anyOf:
        - required:
            - networkProfiles
        - required:
            - qosProfiles

  responses:
    Generic400:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_OUT_OF_RANGE:
              description: Out of Range. Specific Syntax Exception used when a given field has a pre-defined range or a invalid filter criteria combination is requested
              value:
                status: 400
                code: OUT_OF_RANGE
                message: Client specified an invalid range.

    Generic401:
      description: Unauthorized
      headers:
        x-correlator:
          $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"
          examples:
            GENERIC_401_UNAUTHENTICATED:
              description: Request cannot be authenticated
              value:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials.
            GENERIC_401_AUTHENTICATION_REQUIRED:
              description: New authentication is needed, authentication is no longer valid
              value:
                status: 401
                code: AUTHENTICATION_REQUIRED
                message: New authentication is required.

    Generic403:
      description: Forbidden
      headers:
        x-correlator:
          $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"
          examples:
            GENERIC_403_PERMISSION_DENIED:
              description: Permission denied. OAuth2 token access does not have the required scope or when the user fails operational security
              value:
                status: 403
                code: PERMISSION_DENIED
                message: Client does not have sufficient permissions to perform this action.
            GENERIC_403_INVALID_TOKEN_CONTEXT:
              description: Reflect some inconsistency between information in some field of the API and the related OAuth2 Token
              value:
                status: 403
                code: INVALID_TOKEN_CONTEXT
                message: "{{field}} is not consistent with access token."

    Generic404:
      description: Not found
      headers:
        x-correlator:
          $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"
          examples:
            GENERIC_404_NOT_FOUND:
              description: Resource is not found
              value:
                status: 404
                code: NOT_FOUND
                message: The specified resource is not found.

    Generic410:
      description: Gone
      headers:
        x-correlator:
          $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
      content:
        application/json:
          schema:
            $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"
          examples:
            GENERIC_410_GONE:
              description: Use in notifications flow to allow API Consumer to indicate that its callback is no longer available
              value:
                status: 410
                code: GONE
                message: Access to the target resource is no longer available.
